name: Production Multi-File Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-app
  EC2_USER: ubuntu

jobs:
  # STEP 1: Code Validation
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Unit Tests
        run: |
          pip install -r requirements.txt
          pytest

  # STEP 2: Call the external Infrastructure Template File
  infrastructure:
    needs: test
    uses: ./.github/workflows/terraform-shared.yml
    secrets: inherit # Passes your AWS_ROLE_ARN secret down to the template file seamlessly

  # STEP 3: Build, Verify via Trivy, and Deliver Application
  build-and-deploy:
    needs: infrastructure # Waits for the terraform file to complete
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image Locally
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

      - name: Run Trivy Container Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Fetch Private Key from AWS SSM
        id: fetch-key
        run: |
          PRIVATE_KEY=$(aws ssm get-parameter --name "/devops/ec2_private_key" --with-decryption --query "Parameter.Value" --output text)
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "$PRIVATE_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Deploy Code Directly to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Reads the output exported from the modular infrastructure file!
          host: ${{ needs.infrastructure.outputs.ec2_ip }} 
          username: ${{ env.EC2_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker stop my-app || true
            docker rm my-app || true
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            docker run -d --name my-app -p 80:5000 ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest