name: Zero-Secret CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # Mandated for AWS OIDC token exchange
  contents: read    # Mandated to pull down repository source code

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: my-python-app
  EC2_USER: ubuntu

jobs:
  # Job 1: Run local Python Unit Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Unit Tests
        run: |
          pip install -r requirements.txt
          pytest

  # Job 2: Infrastructure Provisioning (Terraform)
  terraform:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.get-ip.outputs.ip }} # Maps the server IP as an output for Job 3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: ${{ env.AWS_REGION }}
          aws-sts-regional-endpoints: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        run: |
          cd terraform/
          terraform init
          terraform apply -auto-approve

      - name: Capture EC2 Public IP
        id: get-ip
        run: |
          cd terraform/
          IP_ADDRESS=$(terraform output -raw ec2_public_ip)
          echo "ip=$IP_ADDRESS" >> $GITHUB_OUTPUT

  # Job 3: Build, Scan Image with Trivy, Push to ECR, and Deploy
  build-scan-and-deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          aws-sts-regional-endpoints: true

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. BUILD IMAGE LOCALLY FIRST
      - name: Build Docker Image Locally
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

      # 2. SCAN THE COMPILED DOCKER IMAGE
      - name: Run Trivy Container Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 3. PUSH TO ECR (Only executes if Trivy scan returns 0 vulnerabilities)
      - name: Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 4. FETCH SSH KEY DYNAMICALLY
      - name: Fetch Private Key from AWS SSM
        id: fetch-key
        run: |
          PRIVATE_KEY=$(aws ssm get-parameter --name "/devops/ec2_private_key" --with-decryption --query "Parameter.Value" --output text)
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "$PRIVATE_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 5. REMOTE SSH DEPLOYMENT ONTO EC2 HOST
      - name: Deploy Code Directly to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            docker stop my-app || true
            docker rm my-app || true
            
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            docker run -d --name my-app -p 80:5000 ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest