name: Zero-Secret CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # Mandated for AWS OIDC token exchange
  contents: read    # Mandated to pull down repository source code

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: arn:aws:iam::123456789012:role/your-existing-oidc-role # <-- REPLACE WITH YOUR AWS OIDC ROLE ARN
  ECR_REPOSITORY: my-python-app
  EC2_USER: ubuntu

jobs:
  # Job 1: Quality Check & Vulnerability Scanning
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Unit Tests
        run: |
          pip install -r requirements.txt
          pytest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # Job 2: Infrastructure Provisioning (Terraform)
  terraform:
    needs: test-and-scan
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.get-ip.outputs.ip }} # Maps the server IP as an output for Job 3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        run: |
          cd terraform/
          terraform init
          terraform apply -auto-approve

      - name: Capture EC2 Public IP
        id: get-ip
        run: |
          cd terraform/
          IP_ADDRESS=$(terraform output -raw ec2_public_ip)
          echo "ip=$IP_ADDRESS" >> $GITHUB_OUTPUT

  # Job 3: Build, Push to ECR, and Dynamic Deploy
  build-and-deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Fetches the SSH Key generated by Terraform on-the-fly from SSM Parameter Store
      - name: Fetch Private Key from AWS SSM
        id: fetch-key
        run: |
          PRIVATE_KEY=$(aws ssm get-parameter --name "/devops/ec2_private_key" --with-decryption --query "Parameter.Value" --output text)
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "$PRIVATE_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Execution deployment onto the remote host via SSH
      - name: Deploy Code Directly to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }} # Consolidated dynamically from Job 2
          username: ${{ env.EC2_USER }}
          key: ${{ env.SSH_KEY }}                    # Consolidated dynamically from SSM Parameter
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            docker stop my-app || true
            docker rm my-app || true
            
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            docker run -d --name my-app -p 80:5000 ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest