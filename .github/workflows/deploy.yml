name: Production Multi-File Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-app
  EC2_USER: ubuntu

jobs:
  # STEP 1: Code Validation
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Unit Tests
        run: |
          pip install -r requirements.txt
          pytest

  # STEP 2: Detect exactly what files changed in this git push
  detect-changes:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Paths Filter Check
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/terraform.yml'

  # STEP 3: Infrastructure Job (Always runs, but passes the change flag down)
  infrastructure:
    needs: [test, detect-changes]
    # FIX: Added the critical './' prefix for local workflow tracking
    uses: ./.github/workflows/terraform.yml@main
    with:
      run_full_apply: ${{ needs.detect-changes.outputs.infra_changed == 'true' }}
    secrets: inherit

  # STEP 4: Build, Scan, and Secure Deployment
  build-and-deploy:
    needs: infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Package Docker Image with Caching
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Container Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push Verified Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Fetch Private Key from AWS SSM
        id: fetch-key
        run: |
          PRIVATE_KEY=$(aws ssm get-parameter --name "/devops/ec2_private_key" --with-decryption --query "Parameter.Value" --output text)
          echo "SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "$PRIVATE_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Deploy Code Directly to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.infrastructure.outputs.ec2_ip }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            sudo docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            sudo docker run -d --name my-app -p 80:5000 ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest