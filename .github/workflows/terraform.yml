name: Reusable Terraform Engine

on:
  workflow_call:
    # CRITICAL ADDITION: This maps and registers incoming parameters from deploy.yml
    inputs:
      run_full_apply:
        required: true
        type: boolean
    outputs:
      ec2_ip:
        description: "The provisioned public IP of the EC2 instance"
        value: ${{ jobs.provision.outputs.ec2_ip }}

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      ec2_ip: ${{ steps.get-ip.outputs.ip }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform/
          terraform init

      # Runs the planning blueprint only if infra modifications were detected
      - name: Terraform Plan
        if: ${{ inputs.run_full_apply == true }}
        run: |
          cd terraform/
          terraform plan -input=false

      # Modifies active AWS infrastructure only if infra modifications were detected
      - name: Terraform Apply
        if: ${{ inputs.run_full_apply == true }}
        run: |
          cd terraform/
          terraform apply -auto-approve -input=false

      # Always extracts the current public IP from your S3 backend file
      - name: Capture EC2 Public IP
        id: get-ip
        run: |
          cd terraform/
          IP_ADDRESS=$(terraform output -raw ec2_public_ip)
          echo "ip=$IP_ADDRESS" >> $GITHUB_OUTPUT